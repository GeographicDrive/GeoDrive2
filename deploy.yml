name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deploy folder
        run: |
          mkdir -p dist
          # Copy everything except git/workflow metadata into the folder
          # that actually gets published.
          rsync -a --exclude='.git' --exclude='.github' ./ dist/

      - name: Inject Cesium Ion token
        env:
          CESIUM_TOKEN: ${{ secrets.CESIUM_TOKEN }}
        run: |
          cat > dist/config.js <<EOF
          // Auto-generated at deploy time from the CESIUM_TOKEN repository
          // secret. This file only exists in the deployed Pages artifact —
          // it is never written back into the git repository.
          window.__DEFAULT_CESIUM_TOKEN__ = "${CESIUM_TOKEN}";
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
